# Launch Doctor — Fly.io deployment
# https://fly.io/docs/apps/processes/

app = "launch-doctor"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/healthz"
    timeout = "5s"

[processes]
  app = "pnpm run docker-start"
  worker = "pnpm run worker:prod"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["app"]

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
  processes = ["worker"]
