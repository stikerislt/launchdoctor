# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "64bc0a8b36533e4a6b743c68f6606dcf"
name = "Launch Doctor"
application_url = "https://launch-doctor.fly.dev"
embedded = true
handle = "launch-doctor"

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/themes/publish"
  topics = [ "themes/publish" ]

[access_scopes]
# Audit reads + Fix Center writes — see docs/FIX_SCOPES.md and app/lib/shopify-scopes.ts
scopes = "read_content,read_files,read_inventory,read_legal_policies,read_locations,read_online_store_pages,read_orders,read_products,read_shipping,read_themes,write_content,write_files,write_inventory,write_products"

[auth]
redirect_urls = [
  "https://launch-doctor.fly.dev/auth/callback",
  "https://launch-doctor.fly.dev/auth/shopify/callback",
]
